<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>腹膜透析 (CAPD) 病患管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-teal-600 rounded-lg flex items-center justify-center text-white font-bold">P</div>
                <h1 class="text-xl font-bold text-slate-950 tracking-tight">腹膜透析 (CAPD) 臨床檢索與管理系統</h1>
            </div>
            <button onclick="openPatientModal()" class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg font-medium shadow-sm transition flex items-center space-x-1">
                <span>➕ 新增病患資料</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-8">
        
        <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
            <h2 class="text-lg font-semibold text-slate-900 border-l-4 border-teal-600 pl-3">條件檢索與綜合篩選</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">病患快速檢索</label>
                    <input type="text" id="searchKey" oninput="debounceSearch()" placeholder="輸入姓名或病歷號..." 
                        class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition">
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">負責主護</label>
                    <select id="filterNurse" onchange="fetchPatients()" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition">
                        <option value="">全部組別</option>
                        <option value="第一組">第一組</option>
                        <option value="第二組">第二組</option>
                        <option value="第三組">第三組</option>
                        <option value="第四組">第四組</option>
                    </select>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">近期 Kt/V 月份</label>
                    <select id="filterKtvMonth" onchange="fetchPatients()" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition">
                        <option value="">全部月份</option>
                        <option value="1">1 月</option>
                        <option value="2">2 月</option>
                        <option value="3">3 月</option>
                        <option value="4">4 月</option>
                        <option value="5">5 月</option>
                        <option value="6">6 月</option>
                        <option value="7">7 月</option>
                        <option value="8">8 月</option>
                        <option value="9">9 月</option>
                        <option value="10">10 月</option>
                        <option value="11">11 月</option>
                        <option value="12">12 月</option>
                    </select>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">近期 PET 月份</label>
                    <select id="filterPetMonth" onchange="fetchPatients()" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition">
                        <option value="">全部月份</option>
                        <option value="1">1 月</option>
                        <option value="2">2 月</option>
                        <option value="3">3 月</option>
                        <option value="4">4 月</option>
                        <option value="5">5 月</option>
                        <option value="6">6 月</option>
                        <option value="7">7 月</option>
                        <option value="8">8 月</option>
                        <option value="9">9 月</option>
                        <option value="10">10 月</option>
                        <option value="11">11 月</option>
                        <option value="12">12 月</option>
                    </select>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">近期換管月份</label>
                    <select id="filterTubeMonth" onchange="fetchPatients()" class="w-full bg-slate-50 border border-slate-300 rounded-xl px-3.5 py-2 text-sm focus:outline-none focus:border-teal-500 focus:bg-white transition">
                        <option value="">全部月份</option>
                        <option value="1">1 月</option>
                        <option value="2">2 月</option>
                        <option value="3">3 月</option>
                        <option value="4">4 月</option>
                        <option value="5">5 月</option>
                        <option value="6">6 月</option>
                        <option value="7">7 月</option>
                        <option value="8">8 月</option>
                        <option value="9">9 月</option>
                        <option value="10">10 月</option>
                        <option value="11">11 月</option>
                        <option value="12">12 月</option>
                    </select>
                </div>
            </div>
            
            <div class="flex justify-end">
                <button onclick="clearFilters()" class="text-xs font-medium text-slate-500 hover:text-slate-800 underline transition underline-offset-4">清除所有篩選條件</button>
            </div>
        </section>

        <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-200 bg-slate-50/70 flex justify-between items-center">
                <h2 class="text-base font-semibold text-slate-900">病患名冊資料調閱</h2>
                <span id="matchCount" class="text-xs bg-slate-200 text-slate-700 font-medium px-2.5 py-1 rounded-full">共 0 筆符合</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-xs font-semibold uppercase tracking-wider">
                            <th class="py-3.5 px-4">病歷號</th>
                            <th class="py-3.5 px-4">姓名</th>
                            <th class="py-3.5 px-4">主護</th>
                            <th class="py-3.5 px-4">處方</th>
                            <th class="py-3.5 px-4">Kt/V月份</th>
                            <th class="py-3.5 px-4">Kt/V1 日期</th>
                            <th class="py-3.5 px-4">Kt/V2 日期</th>
                            <th class="py-3.5 px-4">Kt/V3 日期</th>
                            <th class="py-3.5 px-4">Kt/V4 日期</th>
                            <th class="py-3.5 px-4">PET月份</th>
                            <th class="py-3.5 px-4">換管月份</th>
                            <th class="py-3.5 px-4 text-center">操作面板</th>
                        </tr>
                    </thead>
                    <tbody id="patientTableBody" class="divide-y divide-slate-200 text-sm">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-3">
                <h2 class="text-lg font-semibold text-slate-900 border-l-4 border-teal-600 pl-3">當月醫療追蹤動態指標</h2>
                <span id="currentMonthLabel" class="text-sm font-medium text-teal-700 bg-teal-50 px-3 py-1 rounded-md"></span>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 flex flex-col justify-between shadow-xs">
                    <span class="text-sm font-medium text-slate-500">近期 Kt/V 本月符合人數</span>
                    <div class="mt-2 flex items-baseline space-x-1">
                        <span id="statKtvCount" class="text-3xl font-bold tracking-tight text-slate-950">0</span>
                        <span class="text-sm font-medium text-slate-500">人次</span>
                    </div>
                </div>
                <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 flex flex-col justify-between shadow-xs">
                    <span class="text-sm font-medium text-slate-500">近期 PET 本月符合人數</span>
                    <div class="mt-2 flex items-baseline space-x-1">
                        <span id="statPetCount" class="text-3xl font-bold tracking-tight text-slate-950">0</span>
                        <span class="text-sm font-medium text-slate-500">人次</span>
                    </div>
                </div>
                <div class="bg-slate-50 p-5 rounded-xl border border-slate-200 flex flex-col justify-between shadow-xs">
                    <span class="text-sm font-medium text-slate-500">近期換管 本月符合人數</span>
                    <div class="mt-2 flex items-baseline space-x-1">
                        <span id="statTubeCount" class="text-3xl font-bold tracking-tight text-slate-950">0</span>
                        <span class="text-sm font-medium text-slate-500">人次</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="patientModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 max-w-2xl w-full max-h-[85vh] flex flex-col overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-900">新增病患資料</h3>
                <button onclick="closePatientModal()" class="text-slate-400 hover:text-slate-600 font-bold text-xl">&times;</button>
            </div>
            <form id="patientForm" onsubmit="savePatientForm(event)" class="p-6 overflow-y-auto space-y-4 grid grid-cols-1 md:grid-cols-2 gap-4">

                <div class="space-y-1 md:col-span-1">
                    <label class="text-xs font-bold text-slate-600">病歷號 (主鍵，不可修改) *</label>
                    <input type="text" id="form_medical_record_no" required class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:border-teal-500 focus:outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600">姓名 *</label>
                    <input type="text" id="form_name" required class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:border-teal-500 focus:outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600">編號</label>
                    <input type="number" id="form_id" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:border-teal-500 focus:outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600">負責主護</label>
                    <select id="form_primary_nurse" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:border-teal-500 focus:outline-none">
                        <option value="第一組">第一組</option>
                        <option value="第二組">第二組</option>
                        <option value="第三組">第三組</option>
                        <option value="第四組">第四組</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600">主治醫師 (VS)</label>
                    <input type="text" id="form_attending_physician" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:border-teal-500 focus:outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600">處方</label>
                    <input type="text" id="form_prescription" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:border-teal-500 focus:outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600">近期 Kt/V 月份</label>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600">下次 Kt/V 月份</label>
                    <input type="number" id="form_next_ktv_month" min="1" max="12" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:border-teal-500 focus:outline-none">
                </div>
                
                <div class="md:col-span-2 border-t border-slate-100 pt-3 grid grid-cols-2 sm:grid-cols-4 gap-2">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-600">(1) Kt/V 數值</label>
                        <input type="number" step="0.01" id="form_ktv_value_1" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:border-teal-500 focus:outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-600">(2) Kt/V 數值</label>
                        <input type="number" step="0.01" id="form_ktv_value_2" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:border-teal-500 focus:outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-600">(3) Kt/V 數值</label>
                        <input type="number" step="0.01" id="form_ktv_value_3" class="w-full border border-slate-300 rounded-lg p-2 text-sm focus:border-teal-500 focus:outline-none">
                    </div>
                    <div class="space-y-1">

                    <div class="space-y-1">

                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-600">(3) Kt/V 日期</label>

    <div id="chartModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs flex items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 max-w-xl w-full p-6 space-y-4">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2">
                <div>
                    <h3 class="text-base font-bold text-slate-900">Kt/V 檢驗指標歷史趨勢</h3>
                    <p id="chartPatientMeta" class="text-xs text-slate-500 mt-0.5"></p>
                </div>
                <button onclick="closeChartModal()" class="text-slate-400 hover:text-slate-600 font-bold text-xl">&times;</button>
            </div>
            <div class="w-full h-64">
                <canvas id="trendChart"></canvas>
            </div>
            <div class="flex justify-end">
                <button onclick="closeChartModal()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium text-sm transition">關閉</button>
            </div>
        </div>
    </div>

    <script>
        // ========================================================
        // 核心設定：請在此處替換您在 Supabase 後台取得的專案 API 資訊
        // ========================================================
        const SUPABASE_URL = "https://rxkglykoekrxkvoxpnut.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_4J_6i1LTCdVFQOrY1dPneQ_lUikk6G7";

        // 直接建立連線
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentPatientsData = []; // 快取當前查詢出的病患陣列
        let searchTimeout = null;
        let activeChartInstance = null; // 儲存單一 Chart 實例避免重疊錯誤

        // 初始化載入
        function initApp() {
            initDropdownOptions();
            displayCurrentMonthInfo();
            if (!supabaseClient) {
                alert("請記得先在程式碼內修改並設定正確的 SUPABASE_URL 與 SUPABASE_ANON_KEY 唷！暫時提供模擬介面。");
                renderMockTable();
                return;
            }
            fetchPatients();
            fetchMonthlyStatistics();
        }

        if (document.readyState === 'loading') {
            document.addEventListener("DOMContentLoaded", initApp);
        } else {
            initApp();
        }

        // 生成  Ktv1-12 月下拉選單選項
        function initDropdownOptions() {
            const dropdownIds = ['filterKtvMonth', 'filterPetMonth', 'filterTubeMonth'];
            dropdownIds.forEach(id => {
                const select = document.getElementById(id);
                select.innerHTML = '<option value="">全部月份</option>';
                for (let m = 1; m <= 12; m++) {
                    select.innerHTML += `<option value="${m}">${m} 月</option>`;
                }
            });
        }

        // 標示當前系統月份
        function displayCurrentMonthInfo() {
            const currentMonth = new Date().getMonth() + 1;
            document.getElementById('currentMonthLabel').innerText = `系統判定當前月份：${currentMonth} 月`;
        }

        // 防抖動機制：打字停頓 300 毫秒才觸發搜尋，優化效能
        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetchPatients();
            }, 300);
        }

        // 清除所有篩選控制項
        function clearFilters() {
            document.getElementById('searchKey').value = '';
            document.getElementById('filterNurse').value = '';
            document.getElementById('filterKtvMonth').value = '';
            document.getElementById('filterPetMonth').value = '';
            document.getElementById('filterTubeMonth').value = '';
            fetchPatients();
        }

        // 功能 1 至 5 的串接邏輯：依據條件撈取全部欄位資料
        async function fetchPatients() {
            if (!supabaseClient) return;

            const searchKey = document.getElementById('searchKey').value.trim();
            const nurse = document.getElementById('filterNurse').value;
            const ktvMonth = document.getElementById('filterKtvMonth').value;
            const petMonth = document.getElementById('filterPetMonth').value;
            const tubeMonth = document.getElementById('filterTubeMonth').value;

            try {
                let query = supabaseClient.from('capd_patients').select('*');

                // 功能 1: 模糊比對病患姓名或病歷號
                if (searchKey) {
                    query = query.or(`name.ilike.%${searchKey}%,medical_record_no.ilike.%${searchKey}%`);
                }
                // 功能 2: 負責主護篩選
                if (nurse) query = query.eq('primary_nurse', nurse);
                // 功能 3: 近期Kt/V月份篩選
                if (ktvMonth) query = query.eq('recent_ktv_month', parseInt(ktvMonth));
                // 功能 4: 近期PET月份篩選
                if (petMonth) query = query.eq('recent_pet_month', parseInt(petMonth));
                // 功能 5: 近期換管月份篩選
                if (tubeMonth) query = query.eq('recent_tube_change_month', parseInt(tubeMonth));

                // 排序優化
                query = query.order('medical_record_no', { ascending: true });

                const { data, error } = await query;
                if (error) throw error;

                currentPatientsData = data;
                renderPatientTable(data);
            } catch (err) {
                console.error("讀取病患資料失敗:", err.message);
            }
        }

        // 渲染資料表格
        function renderPatientTable(data) {
            const tbody = document.getElementById('patientTableBody');
            const matchCount = document.getElementById('matchCount');
            tbody.innerHTML = '';
            matchCount.innerText = `共 ${data.length} 筆符合`;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="12" class="text-center py-8 text-slate-400">目前無符合條件之病患資料</td></tr>`;
                return;
            }

            data.forEach(p => {
                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50/80 transition">
                        <td class="py-3 px-4 font-mono font-medium text-slate-900">${p.medical_record_no}</td>
                        <td class="py-3 px-4 font-semibold text-slate-900">${p.name || ''}</td>
                        <td class="py-3 px-4"><span class="bg-slate-100 text-slate-700 px-2 py-0.5 rounded text-xs font-medium">${p.primary_nurse || '未指定'}</span></td>
                        <td class="py-3 px-4 max-w-xs truncate text-slate-600" title="${p.prescription || ''}">${p.prescription || '-'}</td>
                        <td class="py-3 px-4 text-slate-600">${p.recent_ktv_month ? p.recent_ktv_month + '月' : '-'}</td>
                        <td class="py-3 px-4 text-slate-600">${p.ktv_date_1 ? p.ktv_date_1 : '-'}</td>
                        <td class="py-3 px-4 text-slate-600">${p.ktv_date_2 ? p.ktv_date_2 : '-'}</td>
                        <td class="py-3 px-4 text-slate-600">${p.ktv_date_3 ? p.ktv_date_3 : '-'}</td>
                        <td class="py-3 px-4 text-slate-600">${p.ktv_date_4 ? p.ktv_date_4 : '-'}</td>
                        <td class="py-3 px-4 text-slate-600">${p.recent_pet_month ? p.recent_pet_month + '月' : '-'}</td>
                        <td class="py-3 px-4 text-slate-600">${p.recent_tube_change_month ? p.recent_tube_change_month + '月' : '-'}</td>
                        <td class="py-3 px-4 text-center space-x-1.5 whitespace-nowrap">
                            <button onclick="viewTrendChart('${p.medical_record_no}')" class="text-teal-600 hover:text-teal-800 font-medium text-xs border border-teal-200 bg-teal-50 px-2 py-1 rounded hover:bg-teal-100 transition">📈 趨勢圖</button>
                            <button onclick="editPatient('${p.medical_record_no}')" class="text-amber-600 hover:text-amber-800 font-medium text-xs border border-amber-200 bg-amber-50 px-2 py-1 rounded hover:bg-amber-100 transition">修改</button>
                            <button onclick="deletePatient('${p.medical_record_no}')" class="text-rose-600 hover:text-rose-800 font-medium text-xs border border-rose-200 bg-rose-50 px-2 py-1 rounded hover:bg-rose-100 transition">刪除</button>
                        </td>
                    </tr>
                `;
            });
        }

        // 功能 7: 指標統計（進網頁後，下方自動顯示本月符合人次）
        async function fetchMonthlyStatistics() {
            if (!supabaseClient) return;
            const currentMonth = new Date().getMonth() + 1;

            try {
                // 1. 近期Kt/V月份 本月符合
                const { count: ktvCount, error: e1 } = await supabaseClient.from('capd_patients').select('*', { count: 'exact', head: true }).eq('recent_ktv_month', currentMonth);
                // 2. 近期PET月份 本月符合
                const { count: petCount, error: e2 } = await supabaseClient.from('capd_patients').select('*', { count: 'exact', head: true }).eq('recent_pet_month', currentMonth);
                // 3. 近期換管月份 本月符合
                const { count: tubeCount, error: e3 } = await supabaseClient.from('capd_patients').select('*', { count: 'exact', head: true }).eq('recent_tube_change_month', currentMonth);

                if (e1 || e2 || e3) throw (e1 || e2 || e3);

                document.getElementById('statKtvCount').innerText = ktvCount || 0;
                document.getElementById('statPetCount').innerText = petCount || 0;
                document.getElementById('statTubeCount').innerText = tubeCount || 0;
            } catch (err) {
                console.error("讀取動態統計指標失敗:", err.message);
            }
        }

        // 歷史趨勢圖：按下按鈕後依 ktv_value_1 ~ 4 繪製線條圖
        function viewTrendChart(medicalRecordNo) {
            const patient = currentPatientsData.find(p => p.medical_record_no === medicalRecordNo);
            if (!patient) return;

            document.getElementById('chartPatientMeta').innerText = `病患：${patient.name} (${patient.medical_record_no})`;
            document.getElementById('chartModal').classList.remove('hidden');

            const ctx = document.getElementById('trendChart').getContext('2d');
            
            // 提取 4 次檢驗指標，空值以 null 處理
            const chartData = [
                patient.ktv_value_1 || null,
                patient.ktv_value_2 || null,
                patient.ktv_value_3 || null,
                patient.ktv_value_4 || null
            ];
            const chartDates = [
                patient.ktv_date_1 || null,
                patient.ktv_date_2 || null,
                patient.ktv_date_3 || null,
                patient.ktv_date_4 || null
            ];

            // 若已有圖表實例則銷毀重新建立，防止殘留異常
            if (activeChartInstance) activeChartInstance.destroy();

            activeChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['(1) Kt/V 數值', '(2) Kt/V 數值', '(3) Kt/V 數值', '(4) Kt/V 數值'],
                    datasets: [{
                        label: 'Kt/V 數值紀錄',
                        data: chartData,
                        borderColor: '#0d9488', // Teal 600
                        backgroundColor: 'rgba(13, 148, 136, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#0f766e',
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        tension: 0.15,
                        spanGaps: true // 允許跳過中斷的 Null 數值
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label(context) {
                                    const idx = context.dataIndex;
                                    const value = context.formattedValue;
                                    const date = chartDates[idx] ? ` (${chartDates[idx]})` : '';
                                    return `${context.dataset.label}: ${value}${date}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            title: { display: true, text: '檢驗數值 (Kt/V)' }
                        }
                    }
                }
            });
        }

        function closeChartModal() {
            document.getElementById('chartModal').classList.add('hidden');
        }

        // 開啟新增/修改彈出窗
        function openPatientModal() {
            document.getElementById('patientForm').reset();
            document.getElementById('form_is_edit').value = "false";
            document.getElementById('form_medical_record_no').disabled = false;
            document.getElementById('modalTitle').innerText = "新增病患資料 (CAPD)";
            document.getElementById('patientModal').classList.remove('hidden');
        }

        function closePatientModal() {
            document.getElementById('patientModal').classList.add('hidden');
        }

        // 修改功能：將資料帶入表單並開啟
        function editPatient(medicalRecordNo) {
            const p = currentPatientsData.find(patient => patient.medical_record_no === medicalRecordNo);
            if (!p) return;

            document.getElementById('form_is_edit').value = "true";
            document.getElementById('form_medical_record_no').value = p.medical_record_no;
            document.getElementById('form_medical_record_no').disabled = true; // 主鍵不可修改
            
            document.getElementById('form_name').value = p.name || '';
            document.getElementById('form_id').value = p.id || '';
            document.getElementById('form_primary_nurse').value = p.primary_nurse || '第一組';
            document.getElementById('form_attending_physician').value = p.attending_physician || '';
            document.getElementById('form_prescription').value = p.prescription || '';
            document.getElementById('form_recent_ktv_month').value = p.recent_ktv_month || '';
            document.getElementById('form_next_ktv_month').value = p.next_ktv_month || '';
            
            document.getElementById('form_ktv_value_1').value = p.ktv_value_1 || '';
            document.getElementById('form_ktv_value_2').value = p.ktv_value_2 || '';
            document.getElementById('form_ktv_value_3').value = p.ktv_value_3 || '';
            document.getElementById('form_ktv_value_4').value = p.ktv_value_4 || '';
            document.getElementById('form_ktv_date_1').value = p.ktv_date_1 || '';
            document.getElementById('form_ktv_date_2').value = p.ktv_date_2 || '';
            document.getElementById('form_ktv_date_3').value = p.ktv_date_3 || '';
            document.getElementById('form_ktv_date_4').value = p.ktv_date_4 || '';
            
            document.getElementById('form_recent_pet_month').value = p.recent_pet_month || '';
            document.getElementById('form_recent_tube_change_month').value = p.recent_tube_change_month || '';
            document.getElementById('form_phone').value = p.phone || '';
            document.getElementById('form_address').value = p.address || '';

            document.getElementById('modalTitle').innerText = `修改病患資料 (${p.name})`;
            document.getElementById('patientModal').classList.remove('hidden');
        }

        // 功能 6 與 修改：儲存與寫入資料庫
        async function savePatientForm(e) {
            e.preventDefault();
            if (!supabaseClient) return alert("目前處於模擬狀態，無進行 Supabase 實際寫入。");

            const isEdit = document.getElementById('form_is_edit').value === "true";
            const medical_record_no = document.getElementById('form_medical_record_no').value.trim();

            // 封裝表單對象
            const payload = {
                name: document.getElementById('form_name').value.trim(),
                id: document.getElementById('form_id').value ? parseInt(document.getElementById('form_id').value) : null,
                primary_nurse: document.getElementById('form_primary_nurse').value,
                attending_physician: document.getElementById('form_attending_physician').value.trim(),
                prescription: document.getElementById('form_prescription').value.trim(),
                recent_ktv_month: document.getElementById('form_recent_ktv_month').value ? parseInt(document.getElementById('form_recent_ktv_month').value) : null,
                next_ktv_month: document.getElementById('form_next_ktv_month').value ? parseInt(document.getElementById('form_next_ktv_month').value) : null,
                ktv_value_1: document.getElementById('form_ktv_value_1').value ? parseFloat(document.getElementById('form_ktv_value_1').value) : null,
                ktv_value_2: document.getElementById('form_ktv_value_2').value ? parseFloat(document.getElementById('form_ktv_value_2').value) : null,
                ktv_value_3: document.getElementById('form_ktv_value_3').value ? parseFloat(document.getElementById('form_ktv_value_3').value) : null,
                ktv_value_4: document.getElementById('form_ktv_value_4').value ? parseFloat(document.getElementById('form_ktv_value_4').value) : null,
                ktv_date_1: document.getElementById('form_ktv_date_1').value || null,
                ktv_date_2: document.getElementById('form_ktv_date_2').value || null,
                ktv_date_3: document.getElementById('form_ktv_date_3').value || null,
                ktv_date_4: document.getElementById('form_ktv_date_4').value || null,
                recent_pet_month: document.getElementById('form_recent_pet_month').value ? parseInt(document.getElementById('form_recent_pet_month').value) : null,
                recent_tube_change_month: document.getElementById('form_recent_tube_change_month').value ? parseInt(document.getElementById('form_recent_tube_change_month').value) : null,
                phone: document.getElementById('form_phone').value.trim(),
                address: document.getElementById('form_address').value.trim()
            };

            try {
                if (isEdit) {
                    // 執行 UPDATE
                    const { error } = await supabaseClient.from('capd_patients').update(payload).eq('medical_record_no', medical_record_no);
                    if (error) throw error;
                    alert("資料更新成功！");
                } else {
                    // 執行 INSERT
                    payload.medical_record_no = medical_record_no;
                    const { error } = await supabaseClient.from('capd_patients').insert([payload]);
                    if (error) throw error;
                    alert("全新病患資料新增成功！");
                }
                closePatientModal();
                fetchPatients();          // 重新整理名冊
                fetchMonthlyStatistics(); // 重新整理計數看板
            } catch (err) {
                alert("儲存失敗: " + err.message);
            }
        }

        // 刪除功能
        async function deletePatient(medicalRecordNo) {
            if (!confirm(`確定要永久刪除病歷號為 [ ${medicalRecordNo} ] 的病患資料嗎？此操作無法還原。`)) return;
            if (!supabaseClient) return alert("模擬狀態下不執行實際刪除。");

            try {
                const { error } = await supabaseClient.from('capd_patients').delete().eq('medical_record_no', medicalRecordNo);
                if (error) throw error;
                alert("資料已成功刪除。");
                fetchPatients();
                fetchMonthlyStatistics();
            } catch (err) {
                alert("刪除失敗: " + err.message);
            }
        }

        // 模擬環境用降級渲染常式 (在未填寫真實 Key 時供介面預覽)
        function renderMockTable() {
            currentPatientsData = [
                { medical_record_no: "27091447", name: "林麗珠", primary_nurse: "第一組", prescription: "PD2 1.5%:2+2.5*1/1.5", recent_ktv_month: 4, ktv_date_1: "2026-04-01", ktv_date_2: "2026-04-08", ktv_date_3: "2026-04-15", ktv_date_4: "2026-04-22", recent_pet_month: 1, recent_tube_change_month: 1, ktv_value_1: 1.94, ktv_value_2: 1.82, ktv_value_3: 2.01, ktv_value_4: 1.99 },
                { medical_record_no: "24115098", name: "王大同", primary_nurse: "第二組", prescription: "CAPD 2.5Lx3", recent_ktv_month: 6, ktv_date_1: "2026-06-02", ktv_date_2: "2026-06-09", ktv_date_3: null, ktv_date_4: null, recent_pet_month: 6, recent_tube_change_month: 3, ktv_value_1: 1.65, ktv_value_2: 1.72, ktv_value_3: null, ktv_value_4: null }

            renderPatientTable(currentPatientsData);
            document.getElementById('statKtvCount').innerText = "12";
            document.getElementById('statPetCount').innerText = "5";
            document.getElementById('statTubeCount').innerText = "3";
        }
    </script>
